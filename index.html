<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenBeam</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070600;--surface:#100e06;--border:#241c08;--accent:#f0b429;--accent2:#c47f17;
    --text:#f0e8d0;--muted:#5a5040;--success:#00ff9d;--error:#ff4466;--warn:#f0b429}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;
    display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse 60% 40% at 20% 50%,rgba(196,127,23,.08) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 50%,rgba(240,180,41,.05) 0%,transparent 70%);pointer-events:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 28px;
    width:460px;max-width:95vw;position:relative;
    box-shadow:0 0 0 1px rgba(240,180,41,.06),0 32px 64px rgba(0,0,0,.7);animation:fadeUp .4s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
  .logo{font-size:28px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
  .logo-dot{display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%;
    margin-left:3px;vertical-align:middle;box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .subtitle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
  .btn{width:100%;padding:14px 20px;border-radius:10px;border:none;font-family:'Syne',sans-serif;
    font-size:15px;font-weight:700;cursor:pointer;transition:all .2s ease;letter-spacing:.3px;margin-bottom:10px}
  .btn:last-child{margin-bottom:0}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0800;
    box-shadow:0 4px 20px rgba(196,127,23,.35)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(196,127,23,.5)}
  .btn-primary:active{transform:translateY(0)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
  .btn-stop{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);color:var(--error)}
  .btn-stop:hover{background:rgba(255,68,102,.2)}
  .status-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:8px;
    background:rgba(0,0,0,.3);border:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:16px}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .status-dot.waiting{background:var(--muted)}
  .status-dot.live{background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 1.5s infinite}
  .status-dot.error{background:var(--error)}
  .status-dot.loading{background:var(--accent);animation:pulse 1s infinite}
  .status-dot.warn{background:var(--warn)}
  .room-block{padding:20px;border-radius:12px;background:rgba(240,180,41,.04);
    border:1px solid rgba(240,180,41,.15);margin-bottom:14px}
  .room-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .room-code{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;color:var(--accent);
    letter-spacing:12px;text-shadow:0 0 20px rgba(240,180,41,.55);margin-bottom:12px;word-break:break-all}
  .room-url{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);
    background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;padding:10px 14px;
    word-break:break-all;line-height:1.5;cursor:pointer;transition:border-color .2s}
  .room-url:hover{border-color:var(--accent)}
  .copy-hint{font-size:10px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace}
  .copy-hint.copied{color:var(--success)}
  .viewer-badge{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .viewer-badge.connected{color:var(--success)}
  .input-group{margin-bottom:14px}
  input{width:100%;padding:14px 16px;background:rgba(0,0,0,.4);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:24px;
    letter-spacing:8px;text-transform:uppercase;text-align:center;outline:none;
    transition:border-color .2s,box-shadow .2s}
  input::placeholder{letter-spacing:1px;color:var(--muted);text-transform:none;font-size:13px}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,180,41,.12)}
  .notice{padding:14px 16px;border-radius:10px;font-family:'JetBrains Mono',monospace;
    font-size:11px;line-height:1.7;margin-bottom:14px}
  .notice.info{background:rgba(240,180,41,.05);border:1px solid rgba(240,180,41,.15);color:var(--muted)}
  .notice strong{display:block;margin-bottom:4px;font-size:12px;letter-spacing:.5px}
  .notice.info strong{color:var(--accent)}
  .sharing-indicator{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:var(--success)}
  .rec-dot{width:10px;height:10px;background:var(--error);border-radius:50%;animation:pulse 1.2s infinite;
    box-shadow:0 0 8px var(--error)}
  .mode-toggle{margin-top:14px;text-align:center;font-size:13px;color:var(--muted)}
  .mode-toggle a{color:var(--accent);text-decoration:none;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script>
var FIREBASE_URL='https://screenbeam-2f810-default-rtdb.europe-west1.firebasedatabase.app/';
var VIDEO_MAXBITRATE = 3000000;
var AUDIO_MAXBITRATE = 128000;
var ICE_GATHER_TIMEOUT = 1500;
// H264 hardware encode has real pipeline latency (frames get buffered before
// they're ready to send) that Opus audio encode doesn't have, so audio tends
// to arrive ahead of video. We compensate on the receiver by deliberately
// delaying the audio track to match. Tune this if it drifts - a few hundred
// ms is typical for GPU H264 encode. Increase if audio is still early,
// decrease if audio now lags behind video.
var AUDIO_SYNC_DELAY_MS = 220;

var hashCode=location.hash.slice(1).toUpperCase().trim();
var isRecv=hashCode.length>0;
var roomArg=hashCode;
isRecv?renderReceiver():renderSender();

// --- FIREBASE ---
function fbGet(p,cb){var x=new XMLHttpRequest();x.open('GET',FIREBASE_URL+p+'.json',true);
  x.onload=function(){try{cb(null,JSON.parse(x.responseText))}catch(e){cb(null,null)}};
  x.onerror=function(){cb(new Error('net'),null)};x.send()}
function fbPut(p,data,cb){var x=new XMLHttpRequest();x.open('PUT',FIREBASE_URL+p+'.json',true);
  x.setRequestHeader('Content-Type','application/json');
  x.onload=function(){if(cb)cb(null)};x.onerror=function(){if(cb)cb(new Error('net'))};
  x.send(JSON.stringify(data))}
function fbDelete(p){var x=new XMLHttpRequest();x.open('DELETE',FIREBASE_URL+p+'.json',true);x.send()}

// --- ROOM ID ---
function makeRoomId(){
  var SAFE='ACDEFGHJKLMNPQRTUVWXY3478';var r='';
  for(var i=0;i<4;i++)r+=SAFE[Math.floor(Math.random()*SAFE.length)];
  return r}

// --- SENDER UI ---
var senderTimers=[];
var activePc=null,activeStream=null,activeRoomId=null;

function renderSender(){
  document.getElementById('app').innerHTML=
    '<div class="card">'+
      '<div class="logo">ScreenBeam<span class="logo-dot"></span></div>'+
      '<div class="subtitle">Cast / WebRTC / LAN</div>'+
      '<div class="status-bar" id="senderStatus"><div class="status-dot waiting"></div><span>Ready to cast</span></div>'+
      '<div id="modeContent">'+
        '<button class="btn btn-primary" id="startBtn" onclick="startWebRTC()">&#9654; &nbsp;Share My Screen</button>'+
        '<div class="notice info"><strong>LAN Mode - H264 720p30 3 Mbps</strong>'+
          'Direct P2P stream over your local network. H264 GPU encode, low CPU.</div>'+
      '</div>'+
      '<div id="shareControls" style="display:none">'+
        '<div class="sharing-indicator"><div class="rec-dot"></div><span>Streaming</span></div>'+
        '<div class="room-block" id="roomBlock"></div>'+
        '<button class="btn btn-stop" onclick="stopSharing()">&#9632; &nbsp;Stop</button>'+
      '</div>'+
      '<div class="mode-toggle">On the TV? <a onclick="switchToReceiver()">Receiver mode</a></div>'+
    '</div>'}

function setStatus(type,msg){
  var b=document.getElementById('senderStatus');if(!b)return;
  b.querySelector('.status-dot').className='status-dot '+type;
  b.querySelector('span').textContent=msg}

// --- ICE ---
var RTC=window.RTCPeerConnection||window.webkitRTCPeerConnection;
var SDESC=window.RTCSessionDescription||window.webkitRTCSessionDescription;
var ICE_CONFIG={
  iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}],
  iceTransportPolicy:'all',bundlePolicy:'max-bundle',rtcpMuxPolicy:'require',iceCandidatePoolSize:10};

function waitForICE(pc,cb){
  if(pc.iceGatheringState==='complete'){cb(pc.localDescription);return}
  var done=false;
  var t=setTimeout(function(){if(!done){done=true;cb(pc.localDescription)}},ICE_GATHER_TIMEOUT);
  pc.onicegatheringstatechange=function(){
    if(pc.iceGatheringState==='complete'&&!done){done=true;clearTimeout(t);cb(pc.localDescription)}}}

// --- SDP HELPERS ---
// Chrome injects a=extmap-allow-mixed as a bare line (no URI or value after it).
// The WebRTC spec requires at least 2 fields on that line.
// Firefox and Safari both hard-reject it with "Failed to parse SessionDescription".
// Strip it from every SDP we send, both offer (sender) and answer (receiver).
function cleanSDP(sdp){
  var sep=sdp.indexOf('\r\n')>-1?'\r\n':'\n';
  return sdp.split(sep).filter(function(l){
    return l.trim()!=='a=extmap-allow-mixed';
  }).join(sep)}

function preferH264(sdp){
  var sep=sdp.indexOf('\r\n')>-1?'\r\n':'\n';
  var lines=sdp.split(sep);
  var mIdx=-1;
  for(var i=0;i<lines.length;i++){if(lines[i].indexOf('m=video')===0){mIdx=i;break}}
  if(mIdx===-1)return sdp;
  var pts=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.indexOf('a=rtpmap:')===0&&l.toLowerCase().indexOf('h264')>-1){
      pts.push(l.split(':')[1].split(' ')[0])}}
  if(!pts.length)return sdp;
  var mp=lines[mIdx].split(' ');
  var reordered=[mp[0],mp[1],mp[2]];
  pts.forEach(function(pt){reordered.push(pt)});
  mp.slice(3).forEach(function(pt){if(pts.indexOf(pt)===-1)reordered.push(pt)});
  lines[mIdx]=reordered.join(' ');
  return lines.join(sep)}

// --- SENDER WEBRTC ---
function startWebRTC(){
  var btn=document.getElementById('startBtn');
  btn.disabled=true;btn.textContent='Requesting...';
  setStatus('loading','Requesting screen access...');
  navigator.mediaDevices.getDisplayMedia({
    video:{frameRate:{ideal:30,max:30},width:{ideal:1280},height:{ideal:720}},
    audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:48000,channelCount:2}
  }).catch(function(){
    return navigator.mediaDevices.getDisplayMedia({video:true,audio:true})
  }).then(function(stream){
    activeStream=stream;
    var vt=stream.getVideoTracks()[0];
    try{vt.contentHint='detail'}catch(e){}
    vt.onended=function(){stopSharing()};
    var roomId=makeRoomId();activeRoomId=roomId;
    fbDelete('/rooms/'+roomId);
    setStatus('loading','Gathering LAN paths...');
    activePc=new RTC(ICE_CONFIG);
    stream.getTracks().forEach(function(t){activePc.addTrack(t,stream)});
    activePc.onconnectionstatechange=function(){
      var s=activePc.connectionState;
      if(s==='connected'){
        setStatus('live','Streaming - LAN - H264 720p');
        updateViewerBadge(true);
        setTimeout(function(){applyBitrate()},500);
      }
      if(s==='disconnected'||s==='failed'){
        setStatus('warn','Viewer disconnected');updateViewerBadge(false)}};
    activePc.createOffer()
    .then(function(o){return activePc.setLocalDescription(o)})
    .then(function(){
      waitForICE(activePc,function(ld){
        // cleanSDP strips a=extmap-allow-mixed so Firefox/Safari can parse it
        var sdp=preferH264(cleanSDP(ld.sdp));
        fbPut('/rooms/'+roomId+'/offer',{type:ld.type,sdp:sdp,mode:'webrtc'},function(){
          showRoomUI(roomId);
          setStatus('live','Live - waiting for viewer');
          var answered=false;
          var t=setInterval(function(){
            fbGet('/rooms/'+roomId+'/answer',function(err,data){
              if(data&&data.sdp&&!answered){
                answered=true;clearInterval(t);
                activePc.setRemoteDescription(new SDESC(data))
                  .catch(function(e){setStatus('error',e.message)})}})},400);
          senderTimers.push(t)})})})
  }).catch(function(err){
    btn.disabled=false;btn.innerHTML='&#9654; &nbsp;Share My Screen';
    setStatus('error',(err&&err.name==='NotAllowedError')?'Permission denied':'Failed: '+(err&&err.message||err))})}

function applyBitrate(){
  if(!activePc)return;
  try{
    activePc.getSenders().forEach(function(s){
      if(!s.track)return;
      var p=s.getParameters();
      if(!p.encodings||!p.encodings.length)p.encodings=[{}];
      p.encodings.forEach(function(e){
        if(s.track.kind==='video'){
          e.maxBitrate=VIDEO_MAXBITRATE;e.maxFramerate=30;
          e.priority='high';e.networkPriority='high';
        }else{
          e.maxBitrate=AUDIO_MAXBITRATE;
          e.priority='high';e.networkPriority='high';
        }});
      s.setParameters(p).catch(function(){});});}catch(e){}}

function showRoomUI(roomId){
  var btn=document.getElementById('startBtn');if(btn)btn.style.display='none';
  var mc=document.getElementById('modeContent');if(mc)mc.style.display='none';
  document.getElementById('shareControls').style.display='block';
  var tvUrl='https://screenbeam.vercel.app/#'+roomId;
  document.getElementById('roomBlock').innerHTML=
    '<div class="room-label">Room code</div>'+
    '<div class="room-code">'+roomId+'</div>'+
    '<div class="room-label">Or open on the TV</div>'+
    '<div class="room-url" id="tvUrlBox" onclick="copyUrl(\''+tvUrl+'\')">'+tvUrl+'</div>'+
    '<div class="copy-hint" id="copyHint">tap to copy</div>'+
    '<div class="viewer-badge" id="viewerBadge"><div class="status-dot waiting"></div>Waiting for receiver...</div>'}

function updateViewerBadge(connected){
  var b=document.getElementById('viewerBadge');if(!b)return;
  b.className='viewer-badge'+(connected?' connected':'');
  b.innerHTML=connected
    ?'<div class="status-dot live"></div>Receiver connected - LAN P2P'
    :'<div class="status-dot waiting"></div>Waiting for receiver...'}

function copyUrl(url){
  try{navigator.clipboard.writeText(url).then(function(){
    var h=document.getElementById('copyHint');if(!h)return;
    h.textContent='Copied!';h.className='copy-hint copied';
    setTimeout(function(){h.textContent='tap to copy';h.className='copy-hint'},2000)})}catch(e){}}

function stopSharing(){
  senderTimers.forEach(function(t){clearInterval(t)});senderTimers=[];
  if(activeStream){activeStream.getTracks().forEach(function(t){t.stop()});activeStream=null}
  if(activePc){try{activePc.close()}catch(e){}activePc=null}
  if(activeRoomId){fbDelete('/rooms/'+activeRoomId);activeRoomId=null}
  renderSender();setStatus('waiting','Stopped')}

function switchToReceiver(){
  var r=prompt('Enter Room Code:');
  if(r){location.hash=r.trim().toUpperCase();location.reload()}}

// --- RECEIVER ---
var recvPc=null,recvTimers=[];

function renderReceiver(){
  document.getElementById('app').innerHTML=
    '<div class="card">'+
      '<div class="logo">ScreenBeam<span class="logo-dot"></span></div>'+
      '<div class="subtitle">Receiver Mode / TV / Display</div>'+
      '<div class="status-bar" id="recvStatus"><div class="status-dot waiting"></div>'+
        '<span>'+(roomArg?'Connecting to '+roomArg+'...':'Enter room code')+'</span></div>'+
      '<div class="input-group">'+
        '<input type="text" id="codeInput" placeholder="4-letter code" maxlength="4"'+
        ' value="'+roomArg+'" oninput="this.value=this.value.toUpperCase()">'+
      '</div>'+
      '<button class="btn btn-primary" id="connectBtn" onclick="connectReceiver()">Connect</button>'+
      '<div class="mode-toggle" style="margin-top:14px">Sending? '+
        '<a href="/" onclick="location.hash=\'\';location.href=\'/\';return false;">Sender mode</a></div>'+
    '</div>';
  if(roomArg){setTimeout(connectReceiver,600)}}

function connectReceiver(){
  recvTimers.forEach(function(t){clearInterval(t);clearTimeout(t)});recvTimers=[];
  if(recvPc){try{recvPc.close()}catch(e){}recvPc=null}
  var codeInput=document.getElementById('codeInput');
  var roomId=((codeInput?codeInput.value:'')||roomArg).trim().toUpperCase();
  if(!roomId){recvSetStatus('error','Enter a room code');return}
  var btn=document.getElementById('connectBtn');
  if(btn){btn.disabled=true;btn.textContent='Connecting...'}
  recvSetStatus('loading','Looking for stream...');
  var attempts=0,found=false;
  var t=setInterval(function(){
    attempts++;
    if(attempts>60){
      clearInterval(t);recvSetStatus('error','Not found - check code');
      if(btn){btn.disabled=false;btn.innerHTML='Retry'};return}
    if(attempts>3)recvSetStatus('loading','Waiting... ('+attempts+'s)');
    fbGet('/rooms/'+roomId,function(err,data){
      if(found)return;
      if(data&&data.offer&&(data.offer.mode==='webrtc'||data.offer.sdp)){
        found=true;clearInterval(t);connectWebRTC(roomId,data.offer)}})},1000);
  recvTimers.push(t)}

// Delays the audio track by AUDIO_SYNC_DELAY_MS so it lines back up with
// video that's been held up in the H264 encoder's pipeline. Returns a new
// MediaStream with the original video track + delayed audio track. Falls
// back to the original stream if Web Audio isn't available for any reason.
var syncAudioCtx=null;
function buildSyncedStream(stream){
  try{
    var audioTracks=stream.getAudioTracks();
    var videoTracks=stream.getVideoTracks();
    if(!audioTracks.length||AUDIO_SYNC_DELAY_MS<=0)return stream;
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return stream;
    syncAudioCtx=new AC();
    syncAudioCtx.resume().catch(function(){});
    var src=syncAudioCtx.createMediaStreamSource(new MediaStream([audioTracks[0]]));
    var delayNode=syncAudioCtx.createDelay(2.0);
    delayNode.delayTime.value=AUDIO_SYNC_DELAY_MS/1000;
    var dest=syncAudioCtx.createMediaStreamDestination();
    src.connect(delayNode);delayNode.connect(dest);
    var synced=new MediaStream();
    videoTracks.forEach(function(t){synced.addTrack(t)});
    dest.stream.getAudioTracks().forEach(function(t){synced.addTrack(t)});
    return synced;
  }catch(e){return stream}}

function connectWebRTC(roomId,offer){
  recvSetStatus('loading','WebRTC - connecting...');
  recvPc=new RTC(ICE_CONFIG);
  var vid=document.createElement('video');
  vid.style.cssText='position:fixed;inset:0;width:100vw;height:100vh;object-fit:contain;background:#000;z-index:100;cursor:pointer';
  vid.autoplay=true;vid.playsInline=true;vid.muted=false;
  var streamSet=false;
  recvPc.ontrack=function(e){
    if(streamSet||!e.streams||!e.streams[0])return;
    streamSet=true;
    var stream=buildSyncedStream(e.streams[0]);
    document.body.appendChild(vid);
    document.getElementById('app').style.display='none';
    vid.srcObject=stream;
    vid.play().catch(function(){vid.muted=true;vid.play().catch(function(){})});
    var stallTimer=null;
    vid.addEventListener('waiting',function(){if(!stallTimer)stallTimer=setTimeout(function(){stallTimer=null;vid.play().catch(function(){})},1000)});
    vid.addEventListener('stalled',function(){if(!stallTimer)stallTimer=setTimeout(function(){stallTimer=null;vid.play().catch(function(){})},1000)});
    vid.addEventListener('playing',function(){if(stallTimer){clearTimeout(stallTimer);stallTimer=null}});
    var go=vid.requestFullscreen||vid.webkitRequestFullscreen;
    if(go)try{go.call(vid)}catch(e){}
    vid.onclick=function(){
      if(syncAudioCtx){try{syncAudioCtx.close()}catch(e){}syncAudioCtx=null}
      document.body.removeChild(vid);
      document.getElementById('app').style.display='flex';
      renderReceiver()}};
  recvPc.onconnectionstatechange=function(){
    if(recvPc&&recvPc.connectionState==='failed'){recvSetStatus('error','Connection failed')}};
  // cleanSDP on the offer before parsing - in case browser stored it with extmap line
  var cleanOffer={type:offer.type,sdp:cleanSDP(offer.sdp)};
  recvPc.setRemoteDescription(new SDESC(cleanOffer))
  .then(function(){return recvPc.createAnswer()})
  .then(function(a){return recvPc.setLocalDescription(a)})
  .then(function(){
    waitForICE(recvPc,function(ld){
      // cleanSDP on answer too - Chrome adds extmap back during createAnswer
      fbPut('/rooms/'+roomId+'/answer',{type:ld.type,sdp:cleanSDP(ld.sdp)});
      recvSetStatus('live','Streaming via WebRTC - LAN')})})
  .catch(function(e){recvSetStatus('error','WebRTC: '+e.message)})}

function recvSetStatus(type,msg){
  var b=document.getElementById('recvStatus');if(!b)return;
  b.querySelector('.status-dot').className='status-dot '+type;
  b.querySelector('span').textContent=msg}
</script>
</body>
</html>
