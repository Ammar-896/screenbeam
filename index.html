<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenBeam</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #050508;
    --surface:  #0d0d14;
    --border:   #1a1a2e;
    --accent:   #00e5ff;
    --accent2:  #7b2fff;
    --glow:     rgba(0,229,255,0.15);
    --text:     #e8e8f0;
    --muted:    #555570;
    --success:  #00ff9d;
    --error:    #ff4466;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(123,47,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 50%, rgba(0,229,255,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 999;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 48px 40px; width: 460px; max-width: 95vw;
    position: relative; box-shadow: 0 0 0 1px rgba(0,229,255,0.04), 0 32px 64px rgba(0,0,0,0.6);
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    border-radius: 50%;
  }
  .logo {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 4px;
  }
  .logo-dot {
    display: inline-block; width: 8px; height: 8px; background: var(--accent);
    border-radius: 50%; margin-left: 3px; vertical-align: middle;
    box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; transform: scale(1); } 50% { opacity:0.5; transform: scale(0.8); } }
  .subtitle {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px;
  }
  .btn {
    width: 100%; padding: 14px 20px; border-radius: 10px; border: none;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.3px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent2), #5500cc); color: #fff; box-shadow: 0 4px 20px rgba(123,47,255,0.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(123,47,255,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .status-bar {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-bottom: 20px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.waiting { background: var(--muted); }
  .status-dot.live    { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 1.5s infinite; }
  .status-dot.error   { background: var(--error); }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .room-block { margin-top: 28px; padding: 24px; border-radius: 12px; background: rgba(0,229,255,0.03); border: 1px solid rgba(0,229,255,0.12); }
  .room-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .room-code { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: 6px; text-shadow: 0 0 20px rgba(0,229,255,0.4); margin-bottom: 16px; word-break: break-all; }
  .room-url { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; word-break: break-all; line-height: 1.5; cursor: pointer; transition: border-color 0.2s; }
  .room-url:hover { border-color: var(--accent); }
  .copy-hint { font-size: 10px; color: var(--muted); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
  .copy-hint.copied { color: var(--success); }
  .viewer-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
  .viewer-badge.connected { color: var(--success); }
  .input-group { position: relative; margin-bottom: 16px; }
  input {
    width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 16px; letter-spacing: 3px; text-transform: uppercase; text-align: center;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { letter-spacing: 1px; color: var(--muted); text-transform: none; font-size: 13px; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  #receiverVideo { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: contain; background: #000; display: none; z-index: 100; }
  .instructions { margin-top: 28px; padding: 20px; border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); }
  .instructions-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .step { display: flex; gap: 12px; margin-bottom: 10px; font-size: 13px; color: var(--text); line-height: 1.5; align-items: flex-start; }
  .step:last-child { margin-bottom: 0; }
  .step-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent2); background: rgba(123,47,255,0.15); border-radius: 4px; padding: 1px 7px; flex-shrink: 0; margin-top: 1px; }
  .mode-toggle { margin-top: 20px; text-align: center; font-size: 13px; color: var(--muted); }
  .mode-toggle a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .mode-toggle a:hover { text-decoration: underline; }
  .sharing-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 13px; color: var(--success); }
  .rec-dot { width: 10px; height: 10px; background: var(--error); border-radius: 50%; animation: pulse 1.2s infinite; box-shadow: 0 0 8px var(--error); }
  .btn-stop { background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.3); color: var(--error); margin-top: 10px; }
  .btn-stop:hover { background: rgba(255,68,102,0.2); border-color: var(--error); }
</style>
</head>
<body>
<video id="receiverVideo" autoplay playsinline></video>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  STEP 1: Paste your Firebase Realtime Database URL below
//  Looks like: https://YOUR-PROJECT-default-rtdb.firebaseio.com
// ═══════════════════════════════════════════════════════════
var FIREBASE_URL = 'https://screenbeam-2f810-default-rtdb.europe-west1.firebasedatabase.app/';
// ═══════════════════════════════════════════════════════════

// Polyfill WebRTC prefixes for old TV browsers
var RTC = window.RTCPeerConnection || window.webkitRTCPeerConnection || window.mozRTCPeerConnection;
var SDESC = window.RTCSessionDescription || window.webkitRTCSessionDescription;
var ICEC  = window.RTCIceCandidate    || window.webkitRTCIceCandidate;

var ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302'  },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80',   username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443',  username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turns:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
  ]
};

// Global error trap
window.onerror = function(msg, src, line) {
  var app = document.getElementById('app');
  if (app && app.innerHTML.length < 10) {
    app.innerHTML = '<div style="color:#ff4466;font-family:monospace;padding:40px;max-width:90vw">'
      + '<div style="font-size:18px;margin-bottom:10px">ScreenBeam Error</div>'
      + '<div style="font-size:13px">' + msg + '</div>'
      + '<div style="font-size:11px;opacity:0.5;margin-top:6px">Line ' + line + '</div>'
      + '</div>';
  }
};

// ─── FIREBASE REST HELPERS ────────────────────────────────
// Pure XHR — no WebSocket, no SDK. Works on any TV browser.
function fbGet(path, cb) {
  var x = new XMLHttpRequest();
  x.open('GET', FIREBASE_URL + path + '.json', true);
  x.onload  = function() {
    try { cb(null, JSON.parse(x.responseText)); }
    catch(e) { cb(null, null); }
  };
  x.onerror = function() { cb(new Error('network'), null); };
  x.send();
}
function fbPut(path, data, cb) {
  var x = new XMLHttpRequest();
  x.open('PUT', FIREBASE_URL + path + '.json', true);
  x.setRequestHeader('Content-Type', 'application/json');
  x.onload  = function() { if (cb) cb(null); };
  x.onerror = function() { if (cb) cb(new Error('network')); };
  x.send(JSON.stringify(data));
}
function fbPost(path, data, cb) {
  var x = new XMLHttpRequest();
  x.open('POST', FIREBASE_URL + path + '.json', true);
  x.setRequestHeader('Content-Type', 'application/json');
  x.onload  = function() { if (cb) cb(null); };
  x.onerror = function() { if (cb) cb(new Error('network')); };
  x.send(JSON.stringify(data));
}
function fbDelete(path) {
  var x = new XMLHttpRequest();
  x.open('DELETE', FIREBASE_URL + path + '.json', true);
  x.send();
}

// ─── ROUTING ─────────────────────────────────────────────
var hashCode = location.hash.slice(1).toUpperCase().trim();
var isRecv   = hashCode.length > 0;
var roomArg  = hashCode;

// Check Firebase URL is configured
if (FIREBASE_URL.indexOf('YOUR-PROJECT') !== -1) {
  document.getElementById('app').innerHTML =
    '<div style="color:#ff4466;font-family:JetBrains Mono,monospace;padding:40px;max-width:500px;text-align:center">' +
    '<div style="font-size:20px;margin-bottom:16px;color:#00e5ff">ScreenBeam</div>' +
    '<div style="font-size:13px;line-height:1.8">Firebase not configured yet.<br>' +
    'Open index.html and replace<br>' +
    '<span style="color:#7b2fff">YOUR-PROJECT-default-rtdb</span><br>' +
    'with your Firebase project ID.</div></div>';
} else {
  isRecv ? renderReceiver() : renderSender();
}

// ═══════════════════════════════
//  SENDER
// ═══════════════════════════════
var activePc     = null;
var activeStream = null;
var activeRoomId = null;
var senderTimers = [];

function renderSender() {
  var app = document.getElementById('app');
  app.innerHTML =
    '<div class="card">' +
      '<div class="logo">ScreenBeam<span class="logo-dot"></span></div>' +
      '<div class="subtitle">Local Network · WebRTC · Zero Lag</div>' +
      '<div class="status-bar" id="senderStatus">' +
        '<div class="status-dot waiting"></div>' +
        '<span>Ready to cast</span>' +
      '</div>' +
      '<button class="btn btn-primary" id="startBtn" onclick="startSharing()">&#9654; &nbsp; Share My Screen</button>' +
      '<div id="shareControls" style="display:none">' +
        '<div class="sharing-indicator"><div class="rec-dot"></div><span>Sharing — stream is live</span></div>' +
        '<div class="room-block" id="roomBlock"></div>' +
        '<button class="btn btn-stop" onclick="stopSharing()">&#9632; &nbsp; Stop Sharing</button>' +
      '</div>' +
      '<div class="divider">how to connect tv</div>' +
      '<div class="instructions">' +
        '<div class="instructions-title">How to connect TV</div>' +
        '<div class="step"><span class="step-num">1</span><span>Click <strong>Share My Screen</strong> on this device</span></div>' +
        '<div class="step"><span class="step-num">2</span><span>On TV browser, type: <code style="color:var(--accent);font-family:JetBrains Mono,monospace">screenbeam.vercel.app/#ROOMCODE</code></span></div>' +
        '<div class="step"><span class="step-num">3</span><span>TV connects instantly via WebRTC</span></div>' +
      '</div>' +
      '<div class="mode-toggle">On the TV? <a onclick="switchToReceiver()">Switch to receiver mode</a></div>' +
    '</div>';
}

// Strip SDP lines that older TV browsers can't parse,
// and boost bitrate/latency settings for smooth screen sharing
function stripExtmapMixed(sdp) {
  var lines = sdp.split('\r\n');
  var out = [];
  var inVideo = false;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    // Drop the TV-breaking line
    if (line === 'a=extmap-allow-mixed') continue;
    // Track which section we're in
    if (line.indexOf('m=video') === 0) { inVideo = true; }
    else if (line.indexOf('m=') === 0) { inVideo = false; }
    // Replace any existing bandwidth cap with a high one
    if (inVideo && line.indexOf('b=AS:') === 0) continue;
    if (inVideo && line.indexOf('b=TIAS:') === 0) continue;
    out.push(line);
    // Inject high-bitrate hints right after the video m= line
    if (line.indexOf('m=video') === 0) {
      out.push('b=AS:8000');      // 8 Mbps — removes Chrome's default low cap
      out.push('b=TIAS:8000000'); // same in bps for stricter parsers
    }
  }
  return out.join('\r\n');
}

// After RTCPeerConnection connects, push max bitrate directly to the encoder
// This overrides codec defaults for truly smooth 60fps screen sharing
function boostSenderBitrate(pc) {
  try {
    var senders = pc.getSenders();
    for (var i = 0; i < senders.length; i++) {
      var sender = senders[i];
      if (!sender.track || sender.track.kind !== 'video') continue;
      var params = sender.getParameters();
      if (!params.encodings) params.encodings = [{}];
      for (var j = 0; j < params.encodings.length; j++) {
        params.encodings[j].maxBitrate    = 8000000; // 8 Mbps
        params.encodings[j].maxFramerate  = 60;
        params.encodings[j].networkPriority = 'high';
        params.encodings[j].priority       = 'high';
      }
      sender.setParameters(params).catch(function(){});
    }
  } catch(e) {}
}

function startSharing() {
  var btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Requesting screen access…';

  navigator.mediaDevices.getDisplayMedia({
    video: { frameRate: { ideal: 60, max: 60 }, width: { ideal: 1920 }, height: { ideal: 1080 } },
    audio: { echoCancellation: false, noiseSuppression: false, sampleRate: 48000 }
  }).then(function(stream) {
    activeStream = stream;
    activeStream.getVideoTracks()[0].onended = function() { stopSharing(); };

    // Only unambiguous characters — no O/0, I/1, S/5, Z/2 lookalikes
    var SAFE = 'ACDEFGHJKLMNPQRTUVWXY3478';
    var roomId = 'SB';
    for (var ci = 0; ci < 5; ci++) { roomId += SAFE[Math.floor(Math.random() * SAFE.length)]; }
    activeRoomId = roomId;

    // Clean up any old room data first
    fbDelete('/rooms/' + roomId);

    setStatus('loading', 'Setting up connection…');

    activePc = new RTC(ICE_CONFIG);

    // Add all tracks to peer connection
    activeStream.getTracks().forEach(function(track) {
      activePc.addTrack(track, activeStream);
    });

    // Collect ICE candidates and write to Firebase
    activePc.onicecandidate = function(e) {
      if (e.candidate) {
        fbPost('/rooms/' + roomId + '/senderCandidates', e.candidate.toJSON());
      }
    };

    // Watch connection state
    activePc.onconnectionstatechange = function() {
      var state = activePc.connectionState;
      if (state === 'connected') {
        setStatus('live', 'Streaming — connected');
        updateViewerBadge(true);
        boostSenderBitrate(activePc); // push max bitrate to encoder
      } else if (state === 'disconnected' || state === 'failed') {
        setStatus('live', 'Viewer disconnected — waiting');
        updateViewerBadge(false);
      }
    };

    // Create offer
    activePc.createOffer().then(function(offer) {
      return activePc.setLocalDescription(offer);
    }).then(function() {
      // Write offer to Firebase — strip a=extmap-allow-mixed which breaks older TV browsers
      fbPut('/rooms/' + roomId + '/offer', {
        type: activePc.localDescription.type,
        sdp:  stripExtmapMixed(activePc.localDescription.sdp)
      }, function() {
        // Show UI
        btn.style.display = 'none';
        document.getElementById('shareControls').style.display = 'block';

        var tvUrl = 'https://screenbeam.vercel.app/#' + roomId;
        document.getElementById('roomBlock').innerHTML =
          '<div class="room-label">Room code</div>' +
          '<div class="room-code">' + roomId + '</div>' +
          '<div class="room-label">Open this URL on your TV browser</div>' +
          '<div class="room-url" id="tvUrlBox" onclick="copyUrl(\'' + tvUrl + '\')">' + tvUrl + '</div>' +
          '<div class="copy-hint" id="copyHint">&#8593; tap to copy</div>' +
          '<div class="viewer-badge" id="viewerBadge">' +
            '<div class="status-dot waiting"></div>Waiting for TV to connect…' +
          '</div>';

        setStatus('live', 'Live — waiting for viewer');

        // Poll for answer from TV
        var answered = false;
        var knownRecvKeys = {};
        var answerTimer = setInterval(function() {
          fbGet('/rooms/' + roomId + '/answer', function(err, data) {
            if (data && data.sdp && !answered) {
              answered = true;
              activePc.setRemoteDescription(new SDESC(data)).catch(function(e) {
                setStatus('error', 'SDP error: ' + e.message);
              });
            }
          });
          // Also poll for receiver ICE candidates
          fbGet('/rooms/' + roomId + '/receiverCandidates', function(err, candidates) {
            if (!candidates) return;
            var keys = Object.keys(candidates);
            for (var i = 0; i < keys.length; i++) {
              if (!knownRecvKeys[keys[i]]) {
                knownRecvKeys[keys[i]] = true;
                try {
                  activePc.addIceCandidate(new ICEC(candidates[keys[i]])).catch(function(){});
                } catch(e) {}
              }
            }
          });
        }, 300);
        senderTimers.push(answerTimer);
      });
    }).catch(function(e) {
      setStatus('error', 'Failed to create offer: ' + e.message);
      btn.disabled = false;
      btn.textContent = '&#9654;  Share My Screen';
    });

  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = '&#9654;  Share My Screen';
    setStatus('error', 'Screen access denied — try again');
  });
}

function stopSharing() {
  // Clear all polling timers
  for (var i = 0; i < senderTimers.length; i++) { clearInterval(senderTimers[i]); }
  senderTimers = [];
  // Stop media tracks
  if (activeStream) { activeStream.getTracks().forEach(function(t) { t.stop(); }); activeStream = null; }
  // Close peer connection
  if (activePc) { try { activePc.close(); } catch(e) {} activePc = null; }
  // Delete room from Firebase
  if (activeRoomId) { fbDelete('/rooms/' + activeRoomId); activeRoomId = null; }
  renderSender();
  setStatus('waiting', 'Sharing stopped');
}

function updateViewerBadge(connected) {
  var badge = document.getElementById('viewerBadge');
  if (!badge) return;
  if (connected) {
    badge.className = 'viewer-badge connected';
    badge.innerHTML = '<div class="status-dot live"></div>TV connected';
  } else {
    badge.className = 'viewer-badge';
    badge.innerHTML = '<div class="status-dot waiting"></div>Waiting for TV to connect…';
  }
}

function copyUrl(url) {
  try {
    navigator.clipboard.writeText(url).then(function() {
      var hint = document.getElementById('copyHint');
      if (!hint) return;
      hint.textContent = '✓ Copied!';
      hint.className = 'copy-hint copied';
      setTimeout(function() { hint.textContent = '↑ tap to copy'; hint.className = 'copy-hint'; }, 2000);
    });
  } catch(e) {}
}

function setStatus(type, msg) {
  var bar = document.getElementById('senderStatus');
  if (!bar) return;
  bar.querySelector('.status-dot').className = 'status-dot ' + type;
  bar.querySelector('span').textContent = msg;
}

function switchToReceiver() {
  var r = prompt('Enter Room Code:');
  if (r) { location.hash = r.trim().toUpperCase(); location.reload(); }
}

// ═══════════════════════════════
//  RECEIVER (TV side)
// ═══════════════════════════════
var recvPc     = null;
var recvTimers = [];

function renderReceiver() {
  var app = document.getElementById('app');
  app.innerHTML =
    '<div class="card">' +
      '<div class="logo">ScreenBeam<span class="logo-dot"></span></div>' +
      '<div class="subtitle">Receiver Mode · TV / Display</div>' +
      '<div class="status-bar" id="recvStatus">' +
        '<div class="status-dot waiting"></div>' +
        '<span>' + (roomArg ? 'Connecting to ' + roomArg + '...' : 'Enter room code') + '</span>' +
      '</div>' +
      '<div class="input-group">' +
        '<input type="text" id="codeInput" placeholder="Enter Room Code" maxlength="10"' +
        ' value="' + roomArg + '" oninput="this.value=this.value.toUpperCase()">' +
      '</div>' +
      '<button class="btn btn-primary" id="connectBtn" onclick="connectReceiver()">' +
        '&#10230; &nbsp; Connect to Stream' +
      '</button>' +
      '<div class="mode-toggle" style="margin-top:20px">' +
        'On the PC/phone? <a href="/" onclick="location.hash=\'\';location.href=\'/\';return false;">Switch to sender</a>' +
      '</div>' +
    '</div>';

  if (roomArg) { setTimeout(connectReceiver, 800); }
}

function connectReceiver() {
  // Stop any previous attempt
  for (var i = 0; i < recvTimers.length; i++) { clearInterval(recvTimers[i]); clearTimeout(recvTimers[i]); }
  recvTimers = [];
  if (recvPc) { try { recvPc.close(); } catch(e) {} recvPc = null; }

  var codeInput = document.getElementById('codeInput');
  var roomId = ((codeInput ? codeInput.value : '') || roomArg).trim().toUpperCase();
  if (!roomId) { recvSetStatus('error', 'Enter a room code'); return; }

  var btn = document.getElementById('connectBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Connecting...'; }

  recvSetStatus('loading', 'Checking Firebase...');

  // Step 1: Poll Firebase for the sender's offer
  var attempts = 0;
  var maxAttempts = 60; // wait up to 60 seconds for sender to go live
  var knownSenderKeys = {};
  var sdpSet = false;
  var answering = false;

  var offerTimer = setInterval(function() {
    attempts++;
    if (attempts > maxAttempts) {
      clearInterval(offerTimer);
      recvSetStatus('error', 'Sender not found — is the room code correct?');
      if (btn) { btn.disabled = false; btn.textContent = '⟶  Retry'; }
      return;
    }
    recvSetStatus('loading', 'Waiting for sender (' + attempts + 's)...');

    fbGet('/rooms/' + roomId + '/offer', function(err, offer) {
      if (err) {
        recvSetStatus('error', 'Firebase error — check internet connection');
        clearInterval(offerTimer);
        if (btn) { btn.disabled = false; btn.textContent = '⟶  Retry'; }
        return;
      }
      if (!offer || !offer.sdp || sdpSet || answering) return;

      answering = true;
      clearInterval(offerTimer);
      recvSetStatus('loading', 'Sender found — connecting...');

      // Step 2: Create peer connection
      recvPc = new RTC(ICE_CONFIG);

      // Step 3: Handle incoming video stream
      recvPc.ontrack = function(e) {
        if (!e.streams || !e.streams[0]) return;
        var stream = e.streams[0];
        var vid = document.getElementById('receiverVideo');
        vid.srcObject = stream;
        vid.muted = true;
        vid.style.display = 'block';

        vid.play().then(function() {
          vid.muted = false;
        }).catch(function() {
          recvSetStatus('loading', 'Tap screen to start playback');
          function handleTap() {
            vid.muted = false;
            vid.play().catch(function(){});
            document.removeEventListener('click', handleTap);
          }
          document.addEventListener('click', handleTap);
        });

        // Fullscreen
        var go = vid.requestFullscreen || vid.webkitRequestFullscreen || vid.mozRequestFullScreen || vid.msRequestFullscreen;
        if (go) { try { go.call(vid); } catch(e) {} }

        document.getElementById('app').style.display = 'none';
        document.body.style.background = '#000';

        // Track ended = sender stopped sharing
        var tracks = stream.getTracks();
        for (var t = 0; t < tracks.length; t++) {
          tracks[t].onended = function() {
            vid.style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.body.style.background = '';
            renderReceiver();
            recvSetStatus('error', 'Stream ended — sender stopped sharing');
          };
        }

        vid.onclick = function() {
          var fs = document.fullscreenElement || document.webkitFullscreenElement;
          if (fs) {
            var ex = document.exitFullscreen || document.webkitExitFullscreen;
            if (ex) { try { ex.call(document); } catch(e2) {} }
          } else {
            vid.style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.body.style.background = '';
            renderReceiver();
          }
        };

        recvSetStatus('live', 'Streaming');
      };

      // Collect ICE candidates and write to Firebase
      recvPc.onicecandidate = function(e) {
        if (e.candidate) {
          fbPost('/rooms/' + roomId + '/receiverCandidates', e.candidate.toJSON());
        }
      };

      recvPc.onconnectionstatechange = function() {
        var state = recvPc ? recvPc.connectionState : '';
        if (state === 'failed') {
          recvSetStatus('error', 'Connection failed — tap Retry');
          if (btn) { btn.disabled = false; btn.textContent = '⟶  Retry'; }
        }
      };

      // Step 4: Set remote description (sender's offer) and create answer
      recvPc.setRemoteDescription(new SDESC(offer)).then(function() {
        sdpSet = true;
        return recvPc.createAnswer();
      }).then(function(answer) {
        return recvPc.setLocalDescription(answer);
      }).then(function() {
        // Step 5: Write answer to Firebase so sender can pick it up
        fbPut('/rooms/' + roomId + '/answer', {
          type: recvPc.localDescription.type,
          sdp:  recvPc.localDescription.sdp
        });

        recvSetStatus('loading', 'Answer sent — establishing stream...');

        // Step 6: Poll for sender ICE candidates
        var candidateTimer = setInterval(function() {
          fbGet('/rooms/' + roomId + '/senderCandidates', function(err2, candidates) {
            if (!candidates || !recvPc) return;
            var keys = Object.keys(candidates);
            for (var k = 0; k < keys.length; k++) {
              if (!knownSenderKeys[keys[k]]) {
                knownSenderKeys[keys[k]] = true;
                try {
                  recvPc.addIceCandidate(new ICEC(candidates[keys[k]])).catch(function(){});
                } catch(e3) {}
              }
            }
          });
        }, 300);
        recvTimers.push(candidateTimer);

        // Stop candidate polling once connected
        var watchTimer = setInterval(function() {
          if (!recvPc) { clearInterval(watchTimer); return; }
          var state = recvPc.connectionState || recvPc.iceConnectionState;
          if (state === 'connected') {
            clearInterval(watchTimer);
            clearInterval(candidateTimer);
          }
        }, 300);
        recvTimers.push(watchTimer);

      }).catch(function(e) {
        recvSetStatus('error', 'WebRTC error: ' + e.message);
        if (btn) { btn.disabled = false; btn.textContent = '⟶  Retry'; }
      });
    });
  }, 1000);

  recvTimers.push(offerTimer);
}

function recvSetStatus(type, msg) {
  var bar = document.getElementById('recvStatus');
  if (!bar) return;
  bar.querySelector('.status-dot').className = 'status-dot ' + type;
  bar.querySelector('span').textContent = msg;
}
</script>
</body>
</html>
