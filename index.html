<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenBeam</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050508;--surface:#0d0d14;--border:#1a1a2e;--accent:#00e5ff;--accent2:#7b2fff;
    --text:#e8e8f0;--muted:#555570;--success:#00ff9d;--error:#ff4466;--warn:#ffaa00}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;
    display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse 60% 40% at 20% 50%,rgba(123,47,255,.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 50%,rgba(0,229,255,.05) 0%,transparent 70%);pointer-events:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 28px;
    width:460px;max-width:95vw;position:relative;
    box-shadow:0 0 0 1px rgba(0,229,255,.04),0 32px 64px rgba(0,0,0,.6);animation:fadeUp .4s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
  .logo{font-size:28px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
  .logo-dot{display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%;
    margin-left:3px;vertical-align:middle;box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .subtitle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
  .btn{width:100%;padding:14px 20px;border-radius:10px;border:none;font-family:'Syne',sans-serif;
    font-size:15px;font-weight:700;cursor:pointer;transition:all .2s ease;letter-spacing:.3px;margin-bottom:10px}
  .btn:last-child{margin-bottom:0}
  .btn-primary{background:linear-gradient(135deg,var(--accent2),#5500cc);color:#fff;
    box-shadow:0 4px 20px rgba(123,47,255,.3)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(123,47,255,.45)}
  .btn-primary:active{transform:translateY(0)}
  .btn-secondary{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);color:var(--accent);font-size:13px;padding:11px}
  .btn-secondary:hover{background:rgba(0,229,255,.12)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
  .btn-stop{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);color:var(--error)}
  .btn-stop:hover{background:rgba(255,68,102,.2)}
  .status-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:8px;
    background:rgba(0,0,0,.3);border:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:16px}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .status-dot.waiting{background:var(--muted)}
  .status-dot.live{background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 1.5s infinite}
  .status-dot.error{background:var(--error)}
  .status-dot.loading{background:var(--accent);animation:pulse 1s infinite}
  .status-dot.warn{background:var(--warn)}
  .mode-tabs{display:flex;gap:8px;margin-bottom:20px}
  .tab{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
  .tab.active{background:rgba(0,229,255,.08);border-color:var(--accent);color:var(--accent)}
  .room-block{padding:20px;border-radius:12px;background:rgba(0,229,255,.03);
    border:1px solid rgba(0,229,255,.12);margin-bottom:14px}
  .room-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .room-code{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;color:var(--accent);
    letter-spacing:12px;text-shadow:0 0 20px rgba(0,229,255,.4);margin-bottom:12px;word-break:break-all}
  .room-url{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);
    background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;padding:10px 14px;
    word-break:break-all;line-height:1.5;cursor:pointer;transition:border-color .2s}
  .room-url:hover{border-color:var(--accent)}
  .copy-hint{font-size:10px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace}
  .copy-hint.copied{color:var(--success)}
  .viewer-badge{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .viewer-badge.connected{color:var(--success)}
  .input-group{margin-bottom:14px}
  input{width:100%;padding:14px 16px;background:rgba(0,0,0,.4);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:24px;
    letter-spacing:8px;text-transform:uppercase;text-align:center;outline:none;
    transition:border-color .2s,box-shadow .2s}
  input::placeholder{letter-spacing:1px;color:var(--muted);text-transform:none;font-size:13px}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.08)}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);
    font-size:11px;font-family:'JetBrains Mono',monospace}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .notice{padding:14px 16px;border-radius:10px;font-family:'JetBrains Mono',monospace;
    font-size:11px;line-height:1.7;margin-bottom:14px}
  .notice.info{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);color:var(--muted)}
  .notice.warn{background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.2);color:#cc8800}
  .notice strong{display:block;margin-bottom:4px;font-size:12px;letter-spacing:.5px}
  .notice.info strong{color:var(--accent)}
  .notice.warn strong{color:var(--warn)}
  .fps-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .fps-bar input[type=range]{flex:1;accent-color:var(--accent2)}
  .fps-val{color:var(--accent);min-width:32px;text-align:right}
  .sharing-indicator{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:var(--success)}
  .rec-dot{width:10px;height:10px;background:var(--error);border-radius:50%;animation:pulse 1.2s infinite;
    box-shadow:0 0 8px var(--error)}
  /* Receiver full-screen image */
  #recvCanvas{position:fixed;inset:0;width:100vw;height:100vh;object-fit:contain;
    background:#000;display:none;z-index:100;cursor:pointer}
  .mode-toggle{margin-top:14px;text-align:center;font-size:13px;color:var(--muted)}
  .mode-toggle a{color:var(--accent);text-decoration:none;cursor:pointer}
</style>
</head>
<body>
<canvas id="recvCanvas"></canvas>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
var FIREBASE_URL='https://screenbeam-2f810-default-rtdb.europe-west1.firebasedatabase.app/';
// Frame chunks stored under /rooms/{id}/frames/{seq}
// Each chunk: { seq, total, part, data } — base64 JPEG split into parts if needed

var ua=navigator.userAgent||'';
var isAndroid=/Android/i.test(ua);
var isIOS=/iPad|iPhone|iPod/.test(ua);
var isMobile=isAndroid||isIOS;

// Can we do WebRTC screen share? Desktop + iOS 15.4+
var canRTCShare=!!(navigator.mediaDevices&&typeof navigator.mediaDevices.getDisplayMedia==='function')&&!isAndroid;

var hashCode=location.hash.slice(1).toUpperCase().trim();
var isRecv=hashCode.length>0;
var roomArg=hashCode;

isRecv?renderReceiver():renderSender();

// ─────────────────────────────────────────────
//  FIREBASE HELPERS
// ─────────────────────────────────────────────
function fbGet(p,cb){var x=new XMLHttpRequest();x.open('GET',FIREBASE_URL+p+'.json',true);
  x.onload=function(){try{cb(null,JSON.parse(x.responseText))}catch(e){cb(null,null)}};
  x.onerror=function(){cb(new Error('net'),null)};x.send()}
function fbPut(p,data,cb){var x=new XMLHttpRequest();x.open('PUT',FIREBASE_URL+p+'.json',true);
  x.setRequestHeader('Content-Type','application/json');
  x.onload=function(){if(cb)cb(null)};x.onerror=function(){if(cb)cb(new Error('net'))};
  x.send(JSON.stringify(data))}
function fbPatch(p,data,cb){var x=new XMLHttpRequest();x.open('PATCH',FIREBASE_URL+p+'.json',true);
  x.setRequestHeader('Content-Type','application/json');
  x.onload=function(){if(cb)cb(null)};x.onerror=function(){if(cb)cb(new Error('net'))};
  x.send(JSON.stringify(data))}
function fbDelete(p){var x=new XMLHttpRequest();x.open('DELETE',FIREBASE_URL+p+'.json',true);x.send()}
function fbListen(p,cb){
  var x=new XMLHttpRequest();x.open('GET',FIREBASE_URL+p+'.json?limitToLast=1',true);
  x.onload=function(){try{cb(null,JSON.parse(x.responseText))}catch(e){cb(null,null)}};
  x.onerror=function(){cb(new Error('net'),null)};x.send()}

// ─────────────────────────────────────────────
//  ROOM CODE
// ─────────────────────────────────────────────
function makeRoomId(){
  var SAFE='ACDEFGHJKLMNPQRTUVWXY3478';var r='';
  for(var i=0;i<4;i++)r+=SAFE[Math.floor(Math.random()*SAFE.length)];
  return r}

// ─────────────────────────────────────────────
//  SENDER UI
// ─────────────────────────────────────────────
var senderMode='webrtc'; // 'webrtc' | 'mobile'
var senderTimers=[];
var activePc=null,activeStream=null,activeRoomId=null;
var mobileCapturing=false,mobileSeq=0,mobileFps=5,mobileCanvas=null,mobileCtx=null,mobileVideoEl=null;

function renderSender(){
  var app=document.getElementById('app');
  // Pick default mode
  if(isAndroid) senderMode='mobile';
  else senderMode='webrtc';

  app.innerHTML=
    '<div class="card">'+
      '<div class="logo">ScreenBeam<span class="logo-dot"></span></div>'+
      '<div class="subtitle">Cast · WebRTC · Frame Stream</div>'+
      '<div class="status-bar" id="senderStatus"><div class="status-dot waiting"></div><span>Ready to cast</span></div>'+
      // Mode tabs — only show if desktop (has real screen share)
      (canRTCShare?
        '<div class="mode-tabs">'+
          '<button class="tab '+(senderMode==='webrtc'?'active':'')+'" onclick="switchMode(\'webrtc\')">🖥 Desktop (WebRTC)</button>'+
          '<button class="tab '+(senderMode==='mobile'?'active':'')+'" onclick="switchMode(\'mobile\')">📱 Mobile (Camera)</button>'+
        '</div>':'')+
      '<div id="modeContent"></div>'+
      '<div id="shareControls" style="display:none">'+
        '<div class="sharing-indicator"><div class="rec-dot"></div><span id="sharingLabel">Streaming</span></div>'+
        '<div class="room-block" id="roomBlock"></div>'+
        '<button class="btn btn-stop" onclick="stopSharing()">■ &nbsp;Stop</button>'+
      '</div>'+
      '<div class="mode-toggle">On the TV? <a onclick="switchToReceiver()">Receiver mode →</a></div>'+
    '</div>';
  renderModeContent();
}

function switchMode(m){
  senderMode=m;
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active',t.textContent.indexOf(m==='webrtc'?'WebRTC':'Camera')>-1)});
  renderModeContent();
}

function renderModeContent(){
  var el=document.getElementById('modeContent');if(!el)return;
  if(senderMode==='webrtc'){
    el.innerHTML=
      '<button class="btn btn-primary" id="startBtn" onclick="startWebRTC()">▶ &nbsp;Share My Screen</button>'+
      '<div class="notice info"><strong>Desktop / iOS</strong>Full-quality real-time stream via WebRTC.</div>';
  } else {
    el.innerHTML=
      '<div class="notice warn">'+
        '<strong>⚠ Android limitation</strong>'+
        'Android Chrome cannot capture the screen directly. Instead, point your camera at the screen — OR open a specific tab/app below to stream its content.'+
      '</div>'+
      '<div class="fps-bar">'+
        '<span style="color:var(--muted);font-family:JetBrains Mono,monospace;font-size:11px">FPS</span>'+
        '<input type="range" min="1" max="15" value="'+mobileFps+'" oninput="mobileFps=+this.value;document.getElementById(\'fpsVal\').textContent=this.value">'+
        '<span class="fps-val" id="fpsVal">'+mobileFps+'</span>'+
      '</div>'+
      '<button class="btn btn-primary" id="startBtn" onclick="startMobileCamera()">📷 &nbsp;Use Camera to Film Screen</button>'+
      '<div class="notice info" style="margin-top:6px"><strong>How it works</strong>Tap the button → allow camera → point your phone camera at your TV/monitor → the live video streams to the receiver.</div>';
  }
}

function setStatus(type,msg){
  var b=document.getElementById('senderStatus');if(!b)return;
  b.querySelector('.status-dot').className='status-dot '+type;
  b.querySelector('span').textContent=msg}

// ─────────────────────────────────────────────
//  WEBRTC PATH (desktop / iOS)
// ─────────────────────────────────────────────
var RTC=window.RTCPeerConnection||window.webkitRTCPeerConnection;
var SDESC=window.RTCSessionDescription||window.webkitRTCSessionDescription;
var ICE_CONFIG={iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun.cloudflare.com:3478'}
  ],
  iceTransportPolicy:'all',bundlePolicy:'max-bundle',rtcpMuxPolicy:'require',
  iceCandidatePoolSize:10};

function waitForICE(pc,cb){
  if(pc.iceGatheringState==='complete'){cb(pc.localDescription);return}
  var done=false;
  var t=setTimeout(function(){if(!done){done=true;cb(pc.localDescription)}},3000);
  pc.onicegatheringstatechange=function(){
    if(pc.iceGatheringState==='complete'&&!done){done=true;clearTimeout(t);cb(pc.localDescription)}}}

function sanitizeSDP(sdp){
  var lines=sdp.split('\r\n'),out=[],inV=false;
  for(var i=0;i<lines.length;i++){var l=lines[i];
    if(l==='a=extmap-allow-mixed')continue;
    if(l.indexOf('m=video')===0)inV=true;else if(l.indexOf('m=')===0)inV=false;
    if(inV&&(l.indexOf('b=AS:')===0||l.indexOf('b=TIAS:')===0))continue;
    out.push(l);
    if(l.indexOf('m=video')===0){out.push('b=AS:10000');out.push('b=TIAS:10000000')}}
  return out.join('\r\n')}

function startWebRTC(){
  var btn=document.getElementById('startBtn');btn.disabled=true;btn.textContent='Requesting…';
  setStatus('loading','Requesting screen access…');
  navigator.mediaDevices.getDisplayMedia({
    video:{frameRate:{ideal:30,max:30},width:{ideal:1920},height:{ideal:1080}},
    audio:true
  }).catch(function(){
    return navigator.mediaDevices.getDisplayMedia({video:true});
  }).then(function(stream){
    activeStream=stream;
    try{stream.getVideoTracks()[0].contentHint='detail'}catch(e){}
    stream.getVideoTracks()[0].onended=function(){stopSharing()};
    var roomId=makeRoomId();activeRoomId=roomId;
    fbDelete('/rooms/'+roomId);
    setStatus('loading','Gathering paths…');
    activePc=new RTC(ICE_CONFIG);
    stream.getTracks().forEach(function(t){activePc.addTrack(t,stream)});
    activePc.onconnectionstatechange=function(){
      var s=activePc.connectionState;
      if(s==='connected'){
        setStatus('live','Streaming via WebRTC');updateViewerBadge(true);boostBitrate();
        // Re-enforce bitrate every 15s — GCC will throttle quality otherwise
        var enforceT=setInterval(function(){if(activePc&&activePc.connectionState==='connected')boostBitrate()},15000);
        senderTimers.push(enforceT);
        // Monitor quality limitations every 30s and recover if degraded
        var statsT=setInterval(function(){monitorStats()},30000);
        senderTimers.push(statsT);}
      if(s==='disconnected'||s==='failed'){setStatus('live','Viewer disconnected');updateViewerBadge(false)}};
    activePc.createOffer().then(function(o){return activePc.setLocalDescription(o)})
    .then(function(){
      waitForICE(activePc,function(ld){
        fbPut('/rooms/'+roomId+'/offer',{type:ld.type,sdp:sanitizeSDP(ld.sdp),mode:'webrtc'},function(){
          showRoomUI(roomId);setStatus('live','Live — waiting for viewer');
          var answered=false;
          var t=setInterval(function(){
            fbGet('/rooms/'+roomId+'/answer',function(err,data){
              if(data&&data.sdp&&!answered){answered=true;clearInterval(t);
                activePc.setRemoteDescription(new SDESC(data)).catch(function(e){setStatus('error',e.message)})}})},400);
          senderTimers.push(t)})})})
  }).catch(function(err){
    btn.disabled=false;btn.innerHTML='▶ &nbsp;Share My Screen';
    setStatus('error',(err&&err.name==='NotAllowedError')?'Permission denied':'Failed: '+(err&&err.message||err))})}

function boostBitrate(){
  // Single getParameters->mutate->setParameters. Never call setParameters twice
  // on the same sender in one tick; the second call reads stale params and
  // silently overwrites the first with corrupted data, which degrades over time.
  try{var ss=activePc.getSenders();for(var i=0;i<ss.length;i++){var s=ss[i];
    if(!s.track||s.track.kind!=='video')continue;
    var p=s.getParameters();
    if(!p.encodings||!p.encodings.length)p.encodings=[{}];
    for(var j=0;j<p.encodings.length;j++){
      p.encodings[j].maxBitrate=8000000;
      p.encodings[j].maxFramerate=30;
      p.encodings[j].priority='high';
      p.encodings[j].networkPriority='high';}
    s.setParameters(p).catch(function(){});
  }}catch(e){}}

function monitorStats(){
  // No-op: boostBitrate runs on its own 15s timer.
  // Calling boostBitrate here too caused two concurrent setParameters paths to
  // fight each other with stale reads, making quality worse not better.
}

// ─────────────────────────────────────────────
//  MOBILE CAMERA PATH (Android)
// ─────────────────────────────────────────────
function startMobileCamera(){
  var btn=document.getElementById('startBtn');btn.disabled=true;btn.textContent='Starting camera…';
  setStatus('loading','Requesting camera…');
  var constraints={video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false};
  navigator.mediaDevices.getUserMedia(constraints).catch(function(){
    return navigator.mediaDevices.getUserMedia({video:true,audio:false});
  }).then(function(stream){
    activeStream=stream;
    // Hidden video element to grab frames from
    mobileVideoEl=document.createElement('video');
    mobileVideoEl.srcObject=stream;mobileVideoEl.muted=true;mobileVideoEl.autoplay=true;mobileVideoEl.playsInline=true;
    mobileVideoEl.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:50;background:#000';
    document.body.appendChild(mobileVideoEl);
    mobileVideoEl.play().catch(function(){});
    // Canvas for capturing frames
    mobileCanvas=document.createElement('canvas');
    mobileCtx=mobileCanvas.getContext('2d');
    var roomId=makeRoomId();activeRoomId=roomId;
    fbDelete('/rooms/'+roomId);
    fbPut('/rooms/'+roomId+'/meta',{mode:'frames',ts:Date.now()},function(){
      showRoomUI(roomId);
      setStatus('live','Camera live — point at screen');
      mobileCapturing=true;mobileSeq=0;
      // Show stop overlay on video tap
      mobileVideoEl.onclick=function(){stopSharing()};
      startFrameLoop(roomId)});
  }).catch(function(err){
    btn.disabled=false;btn.innerHTML='📷 &nbsp;Use Camera to Film Screen';
    setStatus('error','Camera denied: '+(err&&err.message||err))})}

function startFrameLoop(roomId){
  if(!mobileCapturing)return;
  var interval=Math.round(1000/mobileFps);
  var timer=setInterval(function(){
    if(!mobileCapturing){clearInterval(timer);return}
    captureAndSend(roomId)},interval);
  senderTimers.push(timer)}

function captureAndSend(roomId){
  if(!mobileVideoEl||!mobileCanvas||!mobileCtx)return;
  var vw=mobileVideoEl.videoWidth||640,vh=mobileVideoEl.videoHeight||480;
  // Scale down for Firebase (max ~800px wide)
  var scale=Math.min(1,800/vw);
  mobileCanvas.width=Math.round(vw*scale);mobileCanvas.height=Math.round(vh*scale);
  mobileCtx.drawImage(mobileVideoEl,0,0,mobileCanvas.width,mobileCanvas.height);
  var quality=0.5; // JPEG quality — balance size vs clarity
  var dataUrl=mobileCanvas.toDataURL('image/jpeg',quality);
  var b64=dataUrl.split(',')[1];
  // Firebase values must be <10MB; a 800px JPEG at 0.5 quality is ~30-80KB, well within limits
  mobileSeq++;
  fbPut('/rooms/'+roomId+'/frame',{seq:mobileSeq,data:b64,ts:Date.now()},null)}

// ─────────────────────────────────────────────
//  SHARED SENDER HELPERS
// ─────────────────────────────────────────────
function showRoomUI(roomId){
  var btn=document.getElementById('startBtn');if(btn)btn.style.display='none';
  var mc=document.getElementById('modeContent');if(mc)mc.style.display='none';
  document.getElementById('shareControls').style.display='block';
  var tabs=document.querySelector('.mode-tabs');if(tabs)tabs.style.display='none';
  var tvUrl='https://screenbeam.vercel.app/#'+roomId;
  document.getElementById('roomBlock').innerHTML=
    '<div class="room-label">Room code — enter on receiver</div>'+
    '<div class="room-code">'+roomId+'</div>'+
    '<div class="room-label">Or open directly</div>'+
    '<div class="room-url" id="tvUrlBox" onclick="copyUrl(\''+tvUrl+'\')">'+tvUrl+'</div>'+
    '<div class="copy-hint" id="copyHint">↑ tap to copy</div>'+
    '<div class="viewer-badge" id="viewerBadge"><div class="status-dot waiting"></div>Waiting for receiver…</div>'}

function updateViewerBadge(connected){
  var b=document.getElementById('viewerBadge');if(!b)return;
  b.className='viewer-badge'+(connected?' connected':'');
  b.innerHTML=connected?'<div class="status-dot live"></div>Receiver connected':'<div class="status-dot waiting"></div>Waiting for receiver…'}

function copyUrl(url){
  try{navigator.clipboard.writeText(url).then(function(){
    var h=document.getElementById('copyHint');if(!h)return;
    h.textContent='Copied!';h.className='copy-hint copied';
    setTimeout(function(){h.textContent='↑ tap to copy';h.className='copy-hint'},2000)})}catch(e){}}

function stopSharing(){
  mobileCapturing=false;
  for(var i=0;i<senderTimers.length;i++)clearInterval(senderTimers[i]);senderTimers=[];
  if(activeStream){activeStream.getTracks().forEach(function(t){t.stop()});activeStream=null}
  if(activePc){try{activePc.close()}catch(e){}activePc=null}
  if(mobileVideoEl){try{document.body.removeChild(mobileVideoEl)}catch(e){}mobileVideoEl=null}
  if(activeRoomId){fbDelete('/rooms/'+activeRoomId);activeRoomId=null}
  renderSender();setStatus('waiting','Stopped')}

function switchToReceiver(){
  var r=prompt('Enter Room Code:');
  if(r){location.hash=r.trim().toUpperCase();location.reload()}}

// ─────────────────────────────────────────────
//  RECEIVER
// ─────────────────────────────────────────────
var recvPc=null,recvTimers=[];
var recvMode=null; // 'webrtc' | 'frames'
var recvLastSeq=-1;
var recvCanvas=document.getElementById('recvCanvas');
var recvCtx=recvCanvas?recvCanvas.getContext('2d'):null;

function renderReceiver(){
  var app=document.getElementById('app');
  app.innerHTML=
    '<div class="card">'+
      '<div class="logo">ScreenBeam<span class="logo-dot"></span></div>'+
      '<div class="subtitle">Receiver Mode · TV / Display</div>'+
      '<div class="status-bar" id="recvStatus"><div class="status-dot waiting"></div>'+
        '<span>'+(roomArg?'Connecting to '+roomArg+'…':'Enter room code')+'</span></div>'+
      '<div class="input-group">'+
        '<input type="text" id="codeInput" placeholder="4-letter code" maxlength="4"'+
        ' value="'+roomArg+'" oninput="this.value=this.value.toUpperCase()">'+
      '</div>'+
      '<button class="btn btn-primary" id="connectBtn" onclick="connectReceiver()">⟶ &nbsp;Connect</button>'+
      '<div class="mode-toggle" style="margin-top:14px">Sending? <a href="/" onclick="location.hash=\'\';location.href=\'/\';return false;">Sender mode →</a></div>'+
    '</div>';
  if(roomArg){setTimeout(connectReceiver,600)}}

function connectReceiver(){
  for(var i=0;i<recvTimers.length;i++){clearInterval(recvTimers[i]);clearTimeout(recvTimers[i])}
  recvTimers=[];
  if(recvPc){try{recvPc.close()}catch(e){}recvPc=null}
  recvLastSeq=-1;recvMode=null;
  var codeInput=document.getElementById('codeInput');
  var roomId=((codeInput?codeInput.value:'')||roomArg).trim().toUpperCase();
  if(!roomId){recvSetStatus('error','Enter a room code');return}
  var btn=document.getElementById('connectBtn');
  if(btn){btn.disabled=true;btn.textContent='Connecting…'}
  recvSetStatus('loading','Looking for stream…');
  // Poll for room to appear and detect mode
  var attempts=0,connected=false;
  var t=setInterval(function(){
    attempts++;
    if(attempts>60){clearInterval(t);recvSetStatus('error','Not found — check code');
      if(btn){btn.disabled=false;btn.innerHTML='⟶ Retry'};return}
    if(attempts>3)recvSetStatus('loading','Waiting… ('+attempts+'s)');
    fbGet('/rooms/'+roomId,function(err,data){
      if(connected)return;
      if(!data)return;
      // Detect mode
      if(data.offer&&data.offer.mode==='webrtc'){
        connected=true;clearInterval(t);connectWebRTC(roomId,data.offer)
      } else if(data.meta&&data.meta.mode==='frames'){
        connected=true;clearInterval(t);connectFrames(roomId)}
      else if(data.offer&&data.offer.sdp){
        // Legacy WebRTC without mode tag
        connected=true;clearInterval(t);connectWebRTC(roomId,data.offer)}})},1000);
  recvTimers.push(t)}

// WebRTC receiver path
function connectWebRTC(roomId,offer){
  recvSetStatus('loading','WebRTC — connecting…');
  recvPc=new RTC(ICE_CONFIG);
  var vid=document.createElement('video');
  vid.style.cssText='position:fixed;inset:0;width:100vw;height:100vh;object-fit:contain;background:#000;z-index:100;cursor:pointer';
  vid.autoplay=true;vid.playsInline=true;vid.muted=true;
  recvPc.ontrack=function(e){
    if(!e.streams||!e.streams[0])return;
    var stream=e.streams[0];
    document.body.appendChild(vid);
    document.getElementById('app').style.display='none';
    if('srcObject' in vid)vid.srcObject=stream;else vid.src=URL.createObjectURL(stream);
    vid.play().then(function(){vid.muted=false}).catch(function(){});
    var go=vid.requestFullscreen||vid.webkitRequestFullscreen;if(go)try{go.call(vid)}catch(e){}
    vid.onclick=function(){document.body.removeChild(vid);document.getElementById('app').style.display='flex';renderReceiver()}};
  recvPc.onconnectionstatechange=function(){
    if(recvPc&&recvPc.connectionState==='failed'){recvSetStatus('error','Connection failed')}};
  recvPc.setRemoteDescription(new SDESC(offer))
  .then(function(){return recvPc.createAnswer()})
  .then(function(a){return recvPc.setLocalDescription(a)})
  .then(function(){
    waitForICE(recvPc,function(ld){
      fbPut('/rooms/'+roomId+'/answer',{type:ld.type,sdp:ld.sdp});
      recvSetStatus('live','Streaming via WebRTC')})})
  .catch(function(e){recvSetStatus('error','WebRTC: '+e.message)})}

// Frame stream receiver path (mobile camera)
function connectFrames(roomId){
  recvSetStatus('loading','Connecting frame stream…');
  // Show canvas full screen
  recvCanvas.style.display='block';
  recvCanvas.width=window.innerWidth;recvCanvas.height=window.innerHeight;
  document.getElementById('app').style.display='none';
  document.body.style.background='#000';
  recvCanvas.onclick=function(){
    recvCanvas.style.display='none';
    document.getElementById('app').style.display='flex';
    document.body.style.background='';
    renderReceiver();recvSetStatus('waiting','Disconnected')};
  // Poll for new frames
  var pollInterval=100; // poll every 100ms — fast enough for 10fps
  var t=setInterval(function(){
    fbGet('/rooms/'+roomId+'/frame',function(err,frame){
      if(!frame||!frame.data)return;
      if(frame.seq===recvLastSeq)return; // no new frame
      recvLastSeq=frame.seq;
      drawFrame(frame.data)})},pollInterval);
  recvTimers.push(t);
  // Also check if room disappears (sender stopped)
  var watchT=setInterval(function(){
    fbGet('/rooms/'+roomId+'/meta',function(err,meta){
      if(!meta){clearInterval(t);clearInterval(watchT);
        recvCanvas.style.display='none';document.getElementById('app').style.display='flex';
        document.body.style.background='';renderReceiver();recvSetStatus('error','Stream ended')}})},3000);
  recvTimers.push(watchT);
  recvSetStatus('live','Receiving frames — tap to exit')}

function drawFrame(b64){
  var img=new Image();
  img.onload=function(){
    if(!recvCtx)return;
    var cw=recvCanvas.width,ch=recvCanvas.height;
    var iw=img.width,ih=img.height;
    var scale=Math.min(cw/iw,ch/ih);
    var dw=iw*scale,dh=ih*scale;
    var dx=(cw-dw)/2,dy=(ch-dh)/2;
    recvCtx.fillStyle='#000';recvCtx.fillRect(0,0,cw,ch);
    recvCtx.drawImage(img,dx,dy,dw,dh)};
  img.src='data:image/jpeg;base64,'+b64}

function recvSetStatus(type,msg){
  var b=document.getElementById('recvStatus');if(!b)return;
  b.querySelector('.status-dot').className='status-dot '+type;
  b.querySelector('span').textContent=msg}

window.addEventListener('resize',function(){
  if(recvCanvas.style.display!=='none'){recvCanvas.width=window.innerWidth;recvCanvas.height=window.innerHeight}})
</script>
